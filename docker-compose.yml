version: "3.9"

# =============================================================================
# Docker Compose — Déploiement Sécurisé
# Projet CI/CD DevSecOps
# =============================================================================

networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  monitoring_network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

services:

  # ─── Application FastAPI ───────────────────────────────────────────────────
  api:
    image: ${DOCKER_IMAGE:-devsecops/api:latest}
    container_name: devsecops_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - PYTHONUNBUFFERED=1
    networks:
      - app_network
    # Utilisateur non-root (correspond à l'UID du Dockerfile)
    user: "1001:1001"
    # Limites de ressources (sécurité)
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    # Sécurité des capabilities Linux
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Prometheus — Collecte de métriques ────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: devsecops_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - app_network
      - monitoring_network
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Grafana — Dashboards de monitoring ────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: devsecops_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-ChangeMe123!}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_SECURITY_COOKIE_SECURE=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring_network
    depends_on:
      - prometheus
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
