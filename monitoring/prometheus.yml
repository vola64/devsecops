global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'devsecops-monitor'
    environment: 'production'

scrape_configs:
  # Surveillance de l'API FastAPI
  - job_name: 'devsecops-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Auto-surveillance Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Surveillance des containers Docker (via cadvisor si installé)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    honor_timestamps: true
    scrape_interval: 15s
